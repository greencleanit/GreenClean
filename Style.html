<style>
:root {
  --green-dark: #12372A;
  --green: #1F7A4D;
  --green-light: #DFF3E8;
  --accent: #8CC63F;
  --bg: #F4F8F5;
  --text: #1D1D1F;
  --muted: #667085;
  --border: #D9E4DC;
  --error: #D92D20;
  --success: #17803D;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background:
    radial-gradient(circle at top left, rgba(140,198,63,0.18), transparent 32%),
    linear-gradient(135deg, #F4F8F5 0%, #EAF5EE 100%);
  color: var(--text);
}

.page {
  min-height: 100vh;
  padding: 24px 14px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

.form-card {
  width: 100%;
  max-width: 920px;
  background: #fff;
  border-radius: 28px;
  box-shadow: 0 24px 70px rgba(18, 55, 42, 0.14);
  padding: 28px;
  animation: fadeUp .35s ease;
}

.header {
  text-align: center;
  margin-bottom: 26px;
}

.logo-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 16px;
}

.logo-wrap svg {
  max-width: 230px;
  height: auto;
}

h1 {
  margin: 0;
  font-size: 30px;
  color: var(--green-dark);
}

.header p {
  color: var(--muted);
  margin: 10px auto 0;
  max-width: 560px;
}

.progress-wrap {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 26px;
}

.progress-bar {
  flex: 1;
  height: 10px;
  background: #E7EFEA;
  border-radius: 99px;
  overflow: hidden;
}

#progressFill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--green), var(--accent));
  transition: width .25s ease;
}

#progressText {
  font-weight: 700;
  color: var(--green-dark);
  min-width: 42px;
  text-align: right;
}

.section {
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 22px;
  margin-bottom: 18px;
  background: #FFFFFF;
}

.section h2 {
  margin: 0 0 18px;
  font-size: 19px;
  color: var(--green-dark);
}

.section h3 {
  margin: 20px 0 10px;
  font-size: 15px;
  color: var(--green);
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}

.full {
  grid-column: 1 / -1;
}

label {
  display: flex;
  flex-direction: column;
  gap: 7px;
  font-size: 14px;
  font-weight: 600;
  color: #344054;
}

input,
textarea {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 13px 14px;
  font-family: inherit;
  font-size: 15px;
  outline: none;
  background: #FBFDFB;
  transition: border .2s ease, box-shadow .2s ease, background .2s ease;
}

input:focus,
textarea:focus {
  border-color: var(--green);
  background: #fff;
  box-shadow: 0 0 0 4px rgba(31, 122, 77, .12);
}

input.invalid {
  border-color: var(--error);
  box-shadow: 0 0 0 4px rgba(217, 45, 32, .10);
}

.hint {
  margin: 12px 0 0;
  color: var(--muted);
  font-size: 13px;
}

.checkbox-row {
  flex-direction: row;
  align-items: center;
  margin-bottom: 16px;
  cursor: pointer;
}

.checkbox-row input {
  width: 20px;
  height: 20px;
  accent-color: var(--green);
}

.hidden {
  display: none !important;
}

button {
  width: 100%;
  border: none;
  background: linear-gradient(135deg, var(--green-dark), var(--green));
  color: #fff;
  border-radius: 18px;
  padding: 16px 20px;
  font-size: 17px;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 14px 28px rgba(18, 55, 42, .22);
  transition: transform .2s ease, opacity .2s ease;
}

button:hover {
  transform: translateY(-1px);
}

button:disabled {
  opacity: .72;
  cursor: not-allowed;
}

.spinner {
  width: 18px;
  height: 18px;
  border: 3px solid rgba(255,255,255,.35);
  border-top-color: #fff;
  border-radius: 50%;
  display: inline-block;
  animation: spin .8s linear infinite;
  vertical-align: middle;
  margin-left: 10px;
}

.message {
  margin-top: 18px;
  padding: 16px;
  border-radius: 16px;
  font-weight: 700;
  text-align: center;
}

.message.success {
  color: var(--success);
  background: #E7F7ED;
  border: 1px solid #B8E5C7;
}

.message.error {
  color: var(--error);
  background: #FEECEC;
  border: 1px solid #F5B7B1;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(16px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (max-width: 720px) {
  .page {
    padding: 12px;
  }

  .form-card {
    padding: 20px;
    border-radius: 22px;
  }

  h1 {
    font-size: 25px;
  }

  .section {
    padding: 18px;
  }

  .grid {
    grid-template-columns: 1fr;
  }
}

/* ===========================
   SCHERMATA FINALE SUCCESSO
=========================== */

.success-screen{
    position:fixed;
    inset:0;
    z-index:9999;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:32px;

    background:rgba(18,55,42,.55);
    backdrop-filter:blur(4px);
}

.success-screen.hidden{
    display:none;
}

.success-card{

    width:100%;
    max-width:720px;

    background:#ffffff;

    border-radius:24px;

    padding:48px;

    text-align:center;

    box-shadow:
        0 30px 80px rgba(0,0,0,.18);

    animation:successAppear .35s ease;
}

@keyframes successAppear{

    from{

        opacity:0;
        transform:translateY(20px) scale(.97);

    }

    to{

        opacity:1;
        transform:none;

    }

}

.success-icon{

    width:90px;
    height:90px;

    margin:0 auto 24px;

    border-radius:50%;

    background:#1F7A4D;

    color:#fff;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:46px;
    font-weight:800;
}

.success-card h1{

    margin:0 0 10px;

    color:#12372A;

    font-size:32px;

    font-weight:800;
}

.success-card h2{

    margin:0 0 28px;

    color:#1F7A4D;

    font-size:22px;

    font-weight:700;
}

.success-card p{

    color:#4B5563;

    line-height:1.8;

    margin-bottom:18px;

    font-size:16px;
}

.success-card .thanks{

    color:#12372A;

    font-weight:700;

    margin-top:10px;
}

.success-logo{

    margin:34px auto 12px;

    width:220px;
}

.company-name{

    color:#12372A;

    font-size:20px;

    font-weight:800;

    margin-top:12px;
}

.company-subtitle{

    color:#6B7280;

    font-style:italic;

    margin-top:4px;

    margin-bottom:24px;
}

.note{

    font-size:13px !important;

    color:#8A8F98 !important;

    margin-bottom:32px !important;
}

.close-btn{

    background:#12372A;

    color:#fff;

    border:none;

    border-radius:14px;

    padding:15px 38px;

    font-size:17px;

    font-weight:700;

    cursor:pointer;

    transition:.25s;
}

.close-btn:hover{

    background:#1F7A4D;

    transform:translateY(-2px);
}

@media(max-width:768px){

.success-card{

    padding:34px 24px;

}

.success-card h1{

    font-size:26px;

}

.success-card h2{

    font-size:20px;

}

.success-logo{

    width:170px;

}

}
</style>
